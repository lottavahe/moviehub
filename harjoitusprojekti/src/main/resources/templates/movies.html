<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <title>Movies</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<!--//käytin tekoälyä apuna hahmottelemaan minulle kuinka tehdä korttimaisen näkymän
//html sivulla oleville elokuville bootsrapilla-->
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="page-title">Movies</h1>
                <p class="page-subtitle mb-0">All movies in MovieHub</p>
            </div>

            <div sec:authorize="hasAuthority('ADMIN')">
                <a th:href="@{/addmovie}" class="btn btn-beige">+ Add movie</a>
            </div>
        </div>

        <form th:action="@{/movies/search}" method="get" class="row g-2 mb-4">
            <div class="col-md-10">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control"
                       placeholder="Search by title, director or genre">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-outline-dark">Search</button>
            </div>
        </form>

        <div class="row g-4">
            <div class="col-sm-6 col-md-4 col-lg-3" th:each="movie : ${movies}">
                <div class="card movie-card h-100">
                    <div class="movie-poster-placeholder">
                        <span th:text="${movie.title}">Movie title</span>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${movie.title}">Title</h5>
                        <p class="card-text mb-1">
                            <strong>Director:</strong>
                            <span th:text="${movie.director}"></span>
                        </p>
                        <p class="card-text mb-1">
                            <strong>Year:</strong>
                            <span th:text="${movie.releaseYear}"></span>
                        </p>
                        <p class="card-text mb-3">
                            <strong>Genre:</strong>
                            <span th:text="${movie.genre.genreName}"></span>
                        </p>

                        <div class="mt-auto d-grid gap-2">
                            <a class="btn btn-outline-beige"
                               th:href="@{/addmovietowatchlist/{id}(id=${movie.id})}">
                               Add to watchlist
                            </a>

                            <a class="btn btn-outline-dark"
                               th:href="@{/markmoviewatched/{id}(id=${movie.id})}">
                               Mark as watched
                            </a>

                            <a sec:authorize="hasAuthority('ADMIN')"
                               class="btn btn-danger"
                               th:href="@{/deletemovie/{id}(id=${movie.id})}"
                               onclick="return confirm('Delete this movie?')">
                               Delete
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
