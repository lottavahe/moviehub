<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light navbar-custom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/moviehub}">MovieHub</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/movies}">Movies</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/series}">Series</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/watchlist}">Watchlist</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/watched}">Watched</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-dark btn-sm">
                            <span sec:authentication="name"></span> | Log out
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
