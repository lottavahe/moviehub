<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <title>Moviehub Add</title>
    <meta charset="UTF-8" />

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>
    <h1>Add serie form</h1>

    <form th:object="${serie}" th:action="@{/saveserie}" method="post">

        <div th:if="${#fields.hasErrors('*')}">
            <p>Please fix the errors below.</p>
        </div> <!--käytin tekoälyä tässä apuna kun en ymmärtänyt miten saan 
        errorit näkymään thymeleaf lomakkeessani-->

        <input type="hidden" th:field="*{id}" />


        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}" />
        <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

        <label for="creator">Creator</label>
        <input type="text" id="creator" th:field="*{creator}" />
        <div th:if="${#fields.hasErrors('creator')}" th:errors="*{creator}"></div>

        <label for="releaseYear">Release Year</label>
        <input type="number" id="releaseYear" th:field="*{releaseYear}" />
        <div th:if="${#fields.hasErrors('releaseYear')}" th:errors="*{releaseYear}"></div>
        <div th:if="${#fields.hasErrors('releaseYearValid')}" th:errors="*{releaseYearValid}"></div>

        <label for="seasons">Seasons</label>
        <input type="number" id="seasons" th:field="*{seasons}" />
        <div th:if="${#fields.hasErrors('seasons')}" th:errors="*{seasons}"></div>

        <label for="episodes">Episodes</label>
        <input type="number" id="episodes" th:field="*{episodes}" />
        <div th:if="${#fields.hasErrors('episodes')}" th:errors="*{episodes}"></div>

        <label for="duration">Duration</label>
        <input type="number" id="duration" th:field="*{duration}" />
        <div th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>

        <label for="genre">Genre</label>
        <select id="genre" name="genre" required>
            <option value="">Choose genre</option>
            <option th:each="genre : ${genres}" th:value="${genre.genreId}" th:text="${genre.genreName}">
            </option>
        </select>
        <div th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>

        <input type="submit" value="Save" />
    </form>
</body>

</html>
