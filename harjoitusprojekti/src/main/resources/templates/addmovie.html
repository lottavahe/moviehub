<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Moviehub Add</title>
    <meta charset="UTF-8" />
</head>
<body>
    <h1>Add movie form</h1>

    <form th:object="${movie}" th:action="@{/savemovie}" method="post">

        <input type="hidden" th:field="*{id}" />

        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}" />
       

        <label for="director">Director</label>
        <input type="text" id="director" th:field="*{director}" />
        

        <label for="releaseYear">Release Year</label>
        <input type="number" id="releaseYear" th:field="*{releaseYear}" />
       

        <label for="duration">Duration</label>
        <input type="number" id="duration" th:field="*{duration}" />

        <label for="genre">Genre</label>
        <select id="genre" name="genreId">
            <option th:each="genre : ${genres}"
                    th:value="${genre.genreId}"
                    th:text="${genre.genreName}">
            </option>
        </select>
        
        <input type="submit" value="Save" />
    </form>
</body>
</html>
