<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <title>Series</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<!--//käytin tekoälyä apuna hahmottelemaan minulle kuinka tehdä korttimaisen näkymän
//html sivulla oleville sarjoille bootsrapilla-->
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="page-title">Series</h1>
                <p class="page-subtitle mb-0">All series in MovieHub</p>
            </div>

            <div sec:authorize="hasAuthority('ADMIN')">
                <a th:href="@{/addserie}" class="btn btn-beige">+ Add serie</a>
            </div>
        </div>

        <form th:action="@{/series/search}" method="get" class="row g-2 mb-4">
            <div class="col-md-10">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control"
                       placeholder="Search by title, creator or genre">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-outline-dark">Search</button>
            </div>
        </form>

        <div class="row g-4">
            <div class="col-sm-6 col-md-4 col-lg-3" th:each="serie : ${series}">
                <div class="card movie-card h-100">
                    <div class="movie-poster-placeholder">
                        <span th:text="${serie.title}">Serie title</span>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${serie.title}">Title</h5>

                        <p class="card-text mb-1">
                            <strong>Creator:</strong>
                            <span th:text="${serie.creator}"></span>
                        </p>

                        <p class="card-text mb-1">
                            <strong>Year:</strong>
                            <span th:text="${serie.releaseYear}"></span>
                        </p>

                        <p class="card-text mb-1">
                            <strong>Seasons:</strong>
                            <span th:text="${serie.seasons}"></span>
                        </p>

                        <p class="card-text mb-1">
                            <strong>Episodes:</strong>
                            <span th:text="${serie.episodes}"></span>
                        </p>

                        <p class="card-text mb-1">
                            <strong>Duration:</strong>
                            <span th:text="${serie.duration}"></span>
                            min
                        </p>

                        <p class="card-text mb-3">
                            <strong>Genre:</strong>
                            <span th:text="${serie.genre.genreName}"></span>
                        </p>

                        <div class="mt-auto d-grid gap-2">
                            <a class="btn btn-outline-beige"
                               th:href="@{/addserietowatchlist/{id}(id=${serie.id})}">
                               Add to watchlist
                            </a>

                            <a class="btn btn-outline-dark"
                               th:href="@{/markseriewatched/{id}(id=${serie.id})}">
                               Mark as watched
                            </a>

                            <a sec:authorize="hasAuthority('ADMIN')"
                               class="btn btn-danger"
                               th:href="@{/deleteserie/{id}(id=${serie.id})}"
                               onclick="return confirm('Delete this series?')">
                               Delete
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
